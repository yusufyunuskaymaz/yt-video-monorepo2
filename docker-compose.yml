# ========================================
# ortak-v2: Node.js Backend + PostgreSQL
# ========================================

services:
  # PostgreSQL Veritabanı
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=ai_voice_user
      - POSTGRES_PASSWORD=ai_voice_2026
      - POSTGRES_DB=ai_video-generator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_voice_user -d ai_video-generator"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Node.js Backend
  backend:
    build:
      context: ./yt-auto-video
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://ai_voice_user:ai_voice_2026@postgres:5432/ai_video-generator?schema=public
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - PORT=3000
      - PYTHON_API_URL=${PYTHON_API_URL:-}
      - NODE_CALLBACK_URL=${NODE_CALLBACK_URL:-http://backend:3000/webhook}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma db push && npm run dev"

volumes:
  postgres_data:
